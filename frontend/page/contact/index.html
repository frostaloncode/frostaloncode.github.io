<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="shortcut icon" href="../../assets/icon/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/main.css">
    <script src="../../js/main.js" defer></script>
</head>
<body>
    <div id="navbar-container"></div>

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item active custom-bg-body-black" aria-current="page">Contact</li>
        </ol>
    </nav>
    
    <div class="container text-center my-5">
        <h1 class="text-center mt-3 mb-5" style="font-size: 10vw;">FrosTalon</h1>
    
        <img 
            src="../../assets/image/logo.png" 
            class="img-fluid rounded mx-auto d-block mb-5" 
            alt="Logo Image" 
            style="width: 40vw; height: 30vw;"
        >
    
        <h2 class="text-center mb-3">CONTACT</h2>
    
        <div class="d-flex flex-wrap justify-content-center gap-3">
            <button class="btn btn-lg" type="button" data-bs-toggle="collapse" data-bs-target="#gmailinfo">
                <img src="../../assets/icon/gmail.png" class="img-fluid rounded mx-auto d-block" alt="Gmail Icon" style="width: 48px; height: 48px;">
            </button>
            <button class="btn btn-lg" type="button" data-bs-toggle="collapse" data-bs-target="#mailinfo">
                <img src="../../assets/icon/mail.png" class="img-fluid rounded mx-auto d-block" alt="E-Mail Icon" style="width: 48px; height: 48px;">
            </button>
            <button type="button" class="btn btn-lg" onclick="window.open('https://github.com/frostaloncode', '_blank');">
                <img src="../../assets/icon/github.png" class="img-fluid rounded mx-auto d-block" alt="Github Icon" style="width: 48px; height: 48px;">
            </button>
            <button type="button" class="btn btn-lg" onclick="window.open('https://gitlab.com/owLLord', '_blank');">
                <img src="../../assets/icon/gitlab.png" class="img-fluid rounded mx-auto d-block" alt="Gitlab Icon" style="width: 48px; height: 48px;">
            </button>
            <button type="button" class="btn btn-lg" onclick="window.open('https://bsky.app/profile/sinanuygun.bsky.social', '_blank');">
                <img src="../../assets/icon/bluesky.png" class="img-fluid rounded mx-auto d-block" alt="Bluesky Icon" style="width: 48px; height: 48px;">
            </button>
            <button type="button" class="btn btn-lg" onclick="window.open('https://www.linkedin.com/in/sinanuygun', '_blank');">
                <img src="../../assets/icon/linkedn.png" class="img-fluid rounded mx-auto d-block" alt="Linkedn Icon" style="width: 48px; height: 48px;">
            </button>
            <button type="button" class="btn btn-lg" onclick="window.open('https://www.youtube.com/@SinanUygunOfficial', '_blank');">
                <img src="../../assets/icon/youtube.png" class="img-fluid rounded mx-auto d-block" alt="YouTube Icon" style="width: 48px; height: 48px;">
            </button>
        </div>
    </div>
    <div class="container text-center mt-5">
        <div class="row row-cols-1 align-self-center">
            <div class="col align-self-center">
                <div class="collapse collapse-horizontal" id="gmailinfo">
                    <div class="card card-body " style="width: min-content; display: grid;">
                        sinanuygunofficial@gmail.com
                    </div>
                </div>
            </div>
            <div class="col align-self-center">
                <div class="collapse collapse-horizontal" id="mailinfo">
                    <div class="card card-body " style="width: min-content; display: grid;">
                        sinan_uygun@windowslive.com
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
